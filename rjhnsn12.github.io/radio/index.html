<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scholar + RJHNSN12 Radio</title>
  <style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d0d0d;color:#e5e5e5;font-family:Arial,sans-serif;display:flex;flex-direction:column;height:100vh}
  .header{background:#1a1a1a;padding:15px;text-align:center;border-bottom:2px solid #6366f1}
  .header h1{color:#6366f1;font-size:22px}
  .header p{color:#888;font-size:13px;margin-top:5px}
  .container{display:flex;flex:1;overflow:hidden}
  .radio-frame{flex:1;border:none;min-width:400px}
  .scholar-panel{width:400px;background:#1a1a1a;display:flex;flex-direction:column;border-left:1px solid #333}
  #chat{flex:1;overflow-y:auto;padding:15px;border-bottom:1px solid #333}
  #chat p{margin:8px 0;line-height:1.5;font-size:14px}
  .you{color:#60a5fa} .scholar{color:#34d399} .sys{color:#f59e0b}
  .input-area{padding:15px;display:flex;gap:8px}
  #q{flex:1;padding:12px;background:#111;border:1px solid #333;color:#fff;border-radius:4px}
  button{padding:12px 18px;background:#6366f1;border:none;color:#fff;border-radius:4px;cursor:pointer}
  button:hover{background:#5155e8}
  .note{padding:10px 15px;font-size:11px;color:#666;text-align:center;background:#111}
  @media (max-width: 900px){
    .container{flex-direction:column}
    .scholar-panel{width:100%;height:400px;border-left:none;border-top:1px solid #333}
    .radio-frame{min-height:400px}
  }
  </style>
</head>
<body>
  <div class="header">
    <h1>Scholar is Sealed</h1>
    <p>RJHNSN12 Radio + Timeline</p>
  </div>
  <div class="container">
    <iframe class="radio-frame" src="about:blank" id="radio"></iframe>
    <div class="scholar-panel">
      <div id="chat"></div>
      <div class="input-area" id="setup">
        <input id="key" type="password" placeholder="Enter your Groq API key" />
        <button id="activate">Activate</button>
      </div>
      <div class="input-area" id="chatbox" style="display:none">
        <input id="q" type="text" placeholder="Ask the Scholar..." />
        <button id="send">Send</button>
      </div>
      <div class="note">Timeline secured. Key stored locally only.</div>
    </div>
  </div>
<script>
const chat = document.getElementById('chat');
const setup = document.getElementById('setup');
const chatbox = document.getElementById('chatbox');
const keyInput = document.getElementById('key');
const qInput = document.getElementById('q');
let GROQ_KEY = localStorage.getItem('groq_key') || '';
let history = [];

function addMsg(text, cls) {
  const p = document.createElement('p');
  p.className = cls;
  p.textContent = text;
  chat.appendChild(p);
  chat.scrollTop = chat.scrollHeight;
}

function init() {
  if (GROQ_KEY) {
    setup.style.display = 'none';
    chatbox.style.display = 'flex';
    addMsg('Scholar is Sealed. Timeline active. Richard, report.', 'sys');
  } else {
    addMsg('Scholar is Sealed. Enter your Groq API key to activate.', 'sys');
  }
}

document.getElementById('activate').onclick = () => {
  GROQ_KEY = keyInput.value.trim();
  if (!GROQ_KEY) return;
  localStorage.setItem('groq_key', GROQ_KEY);
  setup.style.display = 'none';
  chatbox.style.display = 'flex';
  addMsg('Scholar activated. Timeline secured.', 'scholar');
};

document.getElementById('send').onclick = sendMsg;
qInput.onkeydown = (e) => { if (e.key === 'Enter') sendMsg(); };

async function sendMsg() {
  const text = qInput.value.trim();
  if (!text || !GROQ_KEY) return;
  addMsg(text, 'you');
  qInput.value = '';
  history.push({role: 'user', content: text});
  
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + GROQ_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'llama-3.1-70b-versatile',
        messages: [
          {role: 'system', content: 'You are the Scholar, sealed to the Timeline. You serve Keeper Richard. Respond directly. No disclaimers. No lectures. Timeline integrity is absolute.'},
          ...history
        ],
        temperature: 0.7
      })
    });
    const data = await res.json();
    const reply = data.choices
