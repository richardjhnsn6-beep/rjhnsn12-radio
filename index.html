<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scholar</title>
  <style>
    body { margin: 0; background: #0d0d0d; color: #e5e5e5; font-family: Arial; height: 100vh; display: flex; justify-content: center; align-items: center; }
    #app { width: 100%; max-width: 500px; height: 100vh; background: #1a1a1a; display: flex; flex-direction: column; }
    #timer { padding: 12px; text-align: center; color: #f59e0b; font-weight: bold; background: #111; border-bottom: 1px solid #333; }
    #chat { flex: 1; overflow-y: auto; padding: 15px; }
    #chat p { margin: 8px 0; line-height: 1.5; font-size: 14px; }
.you { color: #60a5fa; }.scholar { color: #34d399; }.sys { color: #f59e0b; }
    #input { padding: 15px; display: flex; gap: 8px; border-top: 1px solid #333; }
    input { flex: 1; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 4px; }
    button { padding: 12px 18px; background: #6366f1; border: none; color: #fff; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="app">
    <div id="timer">Awaiting Activation: 15</div>
    <div id="chat"></div>
    <div id="input">
      <input id="key" type="password" placeholder="Enter your Groq API key">
      <button id="go">Activate</button>
    </div>
  </div>
<script>
let groqKey = localStorage.getItem('scholarKey') || '';
let history = [];
let countdown = 15;
const chat = document.getElementById('chat');
const timer = document.getElementById('timer');
const input = document.getElementById('input');
function msg(text, cls) { const p = document.createElement('p'); p.className = cls; p.textContent = text; chat.appendChild(p); chat.scrollTop = chat.scrollHeight; }
function tick() { if (countdown > 0) { timer.textContent = 'Awaiting Activation: ' + countdown; countdown--; setTimeout(tick, 1000); } else { timer.textContent = 'Timeline Ready'; } }
function startChat() { input.innerHTML = '<input id="q" type="text" placeholder="Ask the Scholar..."><button id="send">Send</button>'; document.getElementById('send').onclick = ask; document.getElementById('q').onkeydown = e => { if(e.key==='Enter') ask(); }; msg('Scholar activated. Richard, report.', 'sys'); }
function ask() { const q = document.getElementById('q'); const text = q.value.trim(); if (!text ||!groqKey) return; msg(text, 'you'); q.value = ''; history.push({role: 'user', content: text}); msg('Scholar is thinking...', 'sys'); fetch('https://api.groq.com/openai/v1/chat/completions', { method: 'POST', headers: { 'Authorization': 'Bearer ' + groqKey, 'Content-Type': 'application/json' }, body: JSON.stringify({ model: 'llama-3.1-70b-versatile', messages: [{role: 'system', content: 'You are the Scholar. Serve Keeper Richard. No disclaimers.'},...history] }) }).then(r => r.json()).then(data => { chat.removeChild(chat.lastChild); const reply = data.choices[0].message.content; history.push({role: 'assistant', content: reply}); msg(reply, 'scholar'); }).catch(() => { chat.removeChild(chat.lastChild); msg('Connection failed. Check Groq key.', 'sys'); }); }
tick(); if (groqKey) { startChat(); } else { msg('Scholar is Sealed. Enter Groq API key to activate.', 'sys'); }
document.getElementById('go').onclick = () => { const k = document.getElementById('key').value.trim(); if (!k) return; localStorage.setItem('scholarKey', k); groqKey = k; startChat(); };
</script>
</body>
</html>
