<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline Music Player</title>
<style>
:root {
  --bg-primary: #0f0f13;
  --bg-secondary: #1a1a22;
  --bg-tertiary: #252530;
  --accent: #7c5dfa;
  --accent-hover: #9277ff;
  --text-primary: #ffffff;
  --text-secondary: #a3a3b2;
  --text-muted: #6c6c7a;
  --danger: #ec5757;
  --success: #33d69f;
  --border: #2e2e3a;
  --shadow: rgba(0, 0, 0, 0.4);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem 1rem;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  gap: 1.5rem;
}

header {
  text-align: center;
  margin-bottom: 0.5rem;
}

header h1 {
  font-size: 2.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent) 0%, #b38cff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.5rem;
}

header p {
  color: var(--text-secondary);
  font-size: 0.95rem;
}

.drop-zone {
  border: 2px dashed var(--border);
  border-radius: 16px;
  padding: 3rem 2rem;
  text-align: center;
  background: var(--bg-secondary);
  transition: all 0.3s ease;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.drop-zone::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(135deg, rgba(124, 93, 250, 0.1) 0%, rgba(179, 140, 255, 0.1) 100%);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.drop-zone:hover::before,
.drop-zone.drag-over::before {
  opacity: 1;
}

.drop-zone.drag-over {
  border-color: var(--accent);
  transform: scale(1.02);
  box-shadow: 0 8px 32px var(--shadow);
}

.drop-zone-content {
  position: relative;
  z-index: 1;
}

.drop-zone svg {
  width: 64px;
  height: 64px;
  margin-bottom: 1rem;
  opacity: 0.6;
}

.drop-zone h3 {
  font-size: 1.25rem;
  margin-bottom: 0.5rem;
  color: var(--text-primary);
}

.drop-zone p {
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-bottom: 1rem;
}

.btn {
  background: var(--accent);
  color: white;
  border: none;
  padding: 0.75rem 1.5rem;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
}

.btn:hover {
  background: var(--accent-hover);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(124, 93, 250, 0.4);
}

.btn:active {
  transform: translateY(0);
}

.btn-secondary {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}

.btn-secondary:hover {
  background: #32323f;
  box-shadow: 0 4px 12px var(--shadow);
}

.btn-danger {
  background: var(--danger);
}

.btn-danger:hover {
  background: #ff6b6b;
  box-shadow: 0 4px 12px rgba(236, 87, 87, 0.4);
}

.btn-icon {
  padding: 0.5rem;
  border-radius: 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

input[type="file"] {
  display: none;
}

.search-bar {
  display: flex;
  gap: 1rem;
  align-items: center;
  background: var(--bg-secondary);
  padding: 1rem;
  border-radius: 12px;
  border: 1px solid var(--border);
}

.search-bar input {
  flex: 1;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 0.75rem 1rem;
  border-radius: 8px;
  font-size: 0.95rem;
  outline: none;
  transition: all 0.2s ease;
}

.search-bar input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(124, 93, 250, 0.1);
}

.library-stats {
  color: var(--text-secondary);
  font-size: 0.9rem;
  white-space: nowrap;
}

.playlist {
  background: var(--bg-secondary);
  border-radius: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 300px;
}

.playlist-header {
  display: grid;
  grid-template-columns: 50px 1fr 100px 100px 80px;
  gap: 1rem;
  padding: 1rem;
  background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border);
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.playlist-body {
  overflow-y: auto;
  flex: 1;
}

.track {
  display: grid;
  grid-template-columns: 50px 1fr 100px 100px 80px;
  gap: 1rem;
  padding: 1rem;
  border-bottom: 1px solid var(--border);
  align-items: center;
  transition: all 0.2s ease;
  cursor: pointer;
}

.track:hover {
  background: var(--bg-tertiary);
}

.track.playing {
  background: rgba(124, 93, 250, 0.1);
  border-left: 3px solid var(--accent);
}

.track-index {
  color: var(--text-muted);
  font-size: 0.9rem;
  text-align: center;
}

.track.playing .track-index {
  color: var(--accent);
}

.track-name {
  font-weight: 500;
  color: var(--text-primary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.track-duration,
.track-size {
  color: var(--text-secondary);
  font-size: 0.9rem;
}

.track-actions {
  display: flex;
  gap: 0.5rem;
  justify-content: flex-end;
}

.empty-state {
  padding: 4rem 2rem;
  text-align: center;
  color: var(--text-muted);
}

.empty-state svg {
  width: 80px;
  height: 80px;
  margin-bottom: 1rem;
  opacity: 0.3;
}

.player {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  box-shadow: 0 -4px 24px var(--shadow);
  position: sticky;
  bottom: 1rem;
}

.now-playing {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1rem;
}

.album-art {
  width: 60px;
  height: 60px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent) 0%, #b38cff 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.album-art svg {
  width: 32px;
  height: 32px;
  opacity: 0.8;
}

.track-info {
  flex: 1;
  min-width: 0;
}

.track-info h4 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 0.25rem;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.track-info p {
  color: var(--text-secondary);
  font-size: 0.85rem;
}

.volume-control {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  min-width: 120px;
}

.volume-control svg {
  width: 20px;
  height: 20px;
  color: var(--text-secondary);
}

.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  margin-bottom: 1rem;
}

.control-btn {
  background: var(--bg-tertiary);
  border: none;
  color: var(--text-primary);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s ease;
}

.control-btn:hover {
  background: #32323f;
  transform: scale(1.1);
}

.control-btn:active {
  transform: scale(0.95);
}

.control-btn.play-pause {
  width: 56px;
  height: 56px;
  background: var(--accent);
}

.control-btn.play-pause:hover {
  background: var(--accent-hover);
}

.progress-container {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.time {
  font-size: 0.85rem;
  color: var(--text-secondary);
  min-width: 45px;
}

.progress-bar {
  flex: 1;
  height: 6px;
  background: var(--bg-tertiary);
  border-radius: 3px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.progress-bar:hover {
  height: 8px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent) 0%, #b38cff 100%);
  border-radius: 3px;
  width: 0%;
  transition: width 0.1s linear;
  position: relative;
}

.progress-fill::after {
  content: '';
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 12px;
  height: 12px;
  background: white;
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.2s ease;
}

.progress-bar:hover .progress-fill::after {
  opacity: 1;
}

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  background: transparent;
  cursor: pointer;
  width: 100%;
}

input[type="range"]::-webkit-slider-track {
  background: var(--bg-tertiary);
  height: 4px;
  border-radius: 2px;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  background: var(--accent);
  width: 14px;
  height: 14px;
  border-radius: 50%;
  margin-top: -5px;
}

input[type="range"]::-moz-range-track {
  background: var(--bg-tertiary);
  height: 4px;
  border-radius: 2px;
}

input[type="range"]::-moz-range-thumb {
  background: var(--accent);
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: none;
}

.toast {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  padding: 1rem 1.5rem;
  border-radius: 8px;
  box-shadow: 0 8px 24px var(--shadow);
  display: flex;
  align-items: center;
  gap: 0.75rem;
  transform: translateX(400px);
  transition: transform 0.3s ease;
  z-index: 1000;
}

.toast.show {
  transform: translateX(0);
}

.toast.success {
  border-left: 3px solid var(--success);
}

.toast.error {
  border-left: 3px solid var(--danger);
}

@media (max-width: 768px) {
  .container {
    padding: 1rem 0.5rem;
  }

  header h1 {
    font-size: 2rem;
  }

  .playlist-header {
    grid-template-columns: 40px 1fr 80px;
  }

  .playlist-header span:nth-child(3),
  .playlist-header span:nth-child(5) {
    display: none;
  }

  .track {
    grid-template-columns: 40px 1fr 80px;
  }

  .track-duration,
  .track-actions {
    display: none;
  }

  .now-playing {
    flex-wrap: wrap;
  }

  .volume-control {
    width: 100%;
    order: 3;
  }

  .progress-container .time {
    font-size: 0.75rem;
    min-width: 35px;
  }

  .controls {
    gap: 0.5rem;
  }

  .search-bar {
    flex-direction: column;
    align-items: stretch;
  }

  .library-stats {
    text-align: center;
  }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Offline Music Player</h1>
    <p>Upload and play your music collection locally. No internet required.</p>
  </header>

  <div class="drop-zone" id="dropZone">
    <div class="drop-zone-content">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
      </svg>
      <h3>Drop your music files here</h3>
      <p>or click to browse</p>
      <p style="font-size: 0.8rem; margin-top: 0.5rem;">Supports MP3, WAV, OGG, M4A</p>
      <button class="btn" style="margin-top: 1rem;">Choose Files</button>
    </div>
    <input type="file" id="fileInput" accept="audio/mp3,audio/mpeg,audio/wav,audio/ogg,audio/x-m4a,audio/mp4,.mp3,.wav,.ogg,.m4a" multiple>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search your library...">
    <div class="library-stats" id="libraryStats">0 songs</div>
  </div>

  <div class="playlist">
    <div class="playlist-header">
      <span>#</span>
      <span>Title</span>
      <span>Duration</span>
      <span>Size</span>
      <span></span>
    </div>
    <div class="playlist-body" id="playlistBody">
      <div class="empty-state">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path>
        </svg>
        <h3>No songs yet</h3>
        <p>Upload some music to get started</p>
      </div>
    </div>
  </div>

  <div class="player" id="player" style="display: none;">
    <div class="now-playing">
      <div class="album-art">
        <svg fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"></path>
        </svg>
      </div>
      <div class="track-info">
        <h4 id="currentTrackName">No track selected</h4>
        <p id="currentTrackInfo">--</p>
      </div>
      <div class="volume-control">
        <svg fill="currentColor" viewBox="0 0 24 24">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"></path>
        </svg>
        <input type="range" id="volumeSlider" min="0" max="100" value="70">
      </div>
    </div>

    <div class="controls">
      <button class="control-btn" id="prevBtn" title="Previous">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
          <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"></path>
        </svg>
      </button>
      <button class="control-btn play-pause" id="playPauseBtn" title="Play/Pause">
        <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24" id="playIcon">
          <path d="M8 5v14l11-7z"></path>
        </svg>
        <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24" id="pauseIcon" style="display:none;">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>
        </svg>
      </button>
      <button class="control-btn" id="nextBtn" title="Next">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
          <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"></path>
        </svg>
      </button>
    </div>

    <div class="progress-container">
      <span class="time" id="currentTime">0:00</span>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="time" id="totalTime">0:00</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<audio id="audioPlayer"></audio>

<script>
(() => {
  const DB_NAME = 'MusicPlayerDB';
  const DB_VERSION = 1;
  const STORE_NAME = 'tracks';
  
  let db = null;
  let tracks = [];
  let currentTrackIndex = -1;
  let isPlaying = false;
  let fileURLCache = new Map();

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const playlistBody = document.getElementById('playlistBody');
  const searchInput = document.getElementById('searchInput');
  const libraryStats = document.getElementById('libraryStats');
  const player = document.getElementById('player');
  const audioPlayer = document.getElementById('audioPlayer');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const currentTimeEl = document.getElementById('currentTime');
  const totalTimeEl = document.getElementById('totalTime');
  const volumeSlider = document.getElementById('volumeSlider');
  const currentTrackName = document.getElementById('currentTrackName');
  const currentTrackInfo = document.getElementById('currentTrackInfo');
  const playIcon = document.getElementById('playIcon');
  const pauseIcon = document.getElementById('pauseIcon');
  const toast = document.getElementById('toast');

  // Initialize DB
  async function initDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, DB_VERSION);
      
      request.onerror = () => reject(request.error);
      request.onsuccess = () => {
        db = request.result;
        resolve(db);
      };
      
      request.onupgradeneeded = (event) => {
        const db = event.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
          store.createIndex('name', 'name', { unique: false });
        }
      };
    });
  }

  // Add track to DB
  async function addTrack(trackData) {
    return new Promise((resolve, reject) => {
      const transaction = db.transaction([STORE_NAME], 'readwrite');
      const store = transaction.objectStore(STORE_NAME);
      const request = store.add(trackData);
      
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  // Get all tracks from DB
  async function getAllTracks() {
    return new Promise((resolve, reject) => {
      const transaction = db.transaction([STORE_NAME], 'readonly');
      const store = transaction.objectStore(STORE_NAME);
      const request = store.getAll();
      
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  // Delete track from DB
  async function deleteTrack(id) {
    return new Promise((resolve, reject) => {
      const transaction = db.transaction([STORE_NAME], 'readwrite');
      const store = transaction.objectStore(STORE_NAME);
      const request = store.delete(id);
      
      request.onsuccess = () => resolve();
      request.onerror = () => reject(request.error);
    });
  }

  // Get audio duration
  function getAudioDuration(file) {
    return new Promise((resolve) => {
      const audio = new Audio();
      const url = URL.createObjectURL(file);
      audio.addEventListener('loadedmetadata', () => {
        URL.revokeObjectURL(url);
        resolve(audio.duration);
      });
      audio.addEventListener('error', () => {
        URL.revokeObjectURL(url);
        resolve(0);
      });
      audio.src = url;
    });
  }

  // Format time
  function formatTime(seconds) {
    if (isNaN(seconds) || seconds === 0) return '0:00';
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs.toString().padStart(2, '0')}`;
  }

  // Format file size
  function formatFileSize(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
  }

  // Show toast
  function showToast(message, type = 'success') {
    toast.textContent = message;
    toast.className = `toast ${type}`;
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // Handle file upload
  async function handleFiles(files) {
    const audioFiles = Array.from(files).filter(file => 
      file.type.startsWith('audio/') || /\.(mp3|wav|ogg|m4a)$/i.test(file.name)
    );

    if (audioFiles.length === 0) {
      showToast('No valid audio files selected', 'error');
      return;
    }

    showToast(`Uploading ${audioFiles.length} file(s)...`, 'success');

    for (const file of audioFiles) {
      try {
        const duration = await getAudioDuration(file);
        const track = {
          name: file.name.replace(/\.[^/.]+$/, ''),
          fileName: file.name,
          size: file.size,
          duration: duration,
          blob: file,
          dateAdded: new Date().toISOString()
        };
        
        await addTrack(track);
      } catch (error) {
        console.error('Error adding track:', error);
      }
    }

    await loadTracks();
    showToast(`Added ${audioFiles.length} track(s)`, 'success');
  }

  // Load tracks from DB
  async function loadTracks() {
    try {
      tracks = await getAllTracks();
      renderPlaylist();
      updateStats();
    } catch (error) {
      console.error('Error loading tracks:', error);
      showToast('Error loading tracks', 'error');
    }
  }

  // Render playlist
  function renderPlaylist(filterText = '') {
    const filteredTracks = tracks.filter(track => 
      track.name.toLowerCase().includes(filterText.toLowerCase())
    );

    if (filteredTracks.length === 0) {
      playlistBody.innerHTML = `
        <div class="empty-state">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path>
          </svg>
          <h3>${tracks.length === 0 ? 'No songs yet' : 'No matches found'}</h3>
          <p>${tracks.length === 0 ? 'Upload some music to get started' : 'Try a different search term'}</p>
        </div>
      `;
      player.style.display = 'none';
      return;
    }

    playlistBody.innerHTML = filteredTracks.map((track, index) => `
      <div class="track ${index === currentTrackIndex ? 'playing' : ''}" data-id="${track.id}">
        <div class="track-index">${index + 1}</div>
        <div class="track-name" title="${track.name}">${track.name}</div>
        <div class="track-duration">${formatTime(track.duration)}</div>
        <div class="track-size">${formatFileSize(track.size)}</div>
        <div class="track-actions">
          <button class="btn btn-icon btn-danger delete-btn" data-id="${track.id}" title="Delete">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
              <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"></path>
            </svg>
          </button>
        </div>
      </div>
    `).join('');

    if (tracks.length > 0) {
      player.style.display = 'block';
    }
  }

  // Update stats
  function updateStats() {
    const totalDuration = tracks.reduce((sum, track) => sum + track.duration, 0);
    libraryStats.textContent = `${tracks.length} song${tracks.length !== 1 ? 's' : ''} • ${formatTime(totalDuration)}`;
  }

  // Play track
  async function playTrack(index) {
    if (index < 0 || index >= tracks.length) return;

    currentTrackIndex = index;
    const track = tracks[index];

    // Create or reuse object URL
    if (!fileURLCache.has(track.id)) {
      fileURLCache.set(track.id, URL.createObjectURL(track.blob));
    }

    audioPlayer.src = fileURLCache.get(track.id);
    audioPlayer.play();
    isPlaying = true;
    
    currentTrackName.textContent = track.name;
    currentTrackInfo.textContent = `${formatFileSize(track.size)} • ${formatTime(track.duration)}`;
    
    updatePlayPauseIcon();
    renderPlaylist(searchInput.value);
  }

  // Toggle play/pause
  function togglePlayPause() {
    if (currentTrackIndex === -1 && tracks.length > 0) {
      playTrack(0);
      return;
    }

    if (isPlaying) {
      audioPlayer.pause();
      isPlaying = false;
    } else {
      audioPlayer.play();
      isPlaying = true;
    }
    updatePlayPauseIcon();
  }

  // Update play/pause icon
  function updatePlayPauseIcon() {
    if (isPlaying) {
      playIcon.style.display = 'none';
      pauseIcon.style.display = 'block';
    } else {
      playIcon.style.display = 'block';
      pauseIcon.style.display = 'none';
    }
  }

  // Play next
  function playNext() {
    if (tracks.length === 0) return;
    const nextIndex = (currentTrackIndex + 1) % tracks.length;
    playTrack(nextIndex);
  }

  // Play previous
  function playPrevious() {
    if (tracks.length === 0) return;
    if (audioPlayer.currentTime > 3) {
      audioPlayer.currentTime = 0;
    } else {
      const prevIndex = currentTrackIndex - 1 < 0 ? tracks.length - 1 : currentTrackIndex - 1;
      playTrack(prevIndex);
    }
  }

  // Delete track
  async function handleDeleteTrack(id) {
    try {
      await deleteTrack(id);
      
      // Clean up cached URL
      if (fileURLCache.has(id)) {
        URL.revokeObjectURL(fileURLCache.get(id));
        fileURLCache.delete(id);
      }

      const deletedIndex = tracks.findIndex(t => t.id === id);
      await loadTracks();

      if (deletedIndex === currentTrackIndex) {
        audioPlayer.pause();
        currentTrackIndex = -1;
        isPlaying = false;
        if (tracks.length > 0) {
          playTrack(Math.min(deletedIndex, tracks.length - 1));
        } else {
          player.style.display = 'none';
        }
      } else if (deletedIndex < currentTrackIndex) {
        currentTrackIndex--;
      }

      showToast('Track deleted', 'success');
    } catch (error) {
      console.error('Error deleting track:', error);
      showToast('Error deleting track', 'error');
    }
  }

  // Event Listeners
  dropZone.addEventListener('click', () => fileInput.click());
  
  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('drag-over');
  });

  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });

  fileInput.addEventListener('change', (e) => {
    handleFiles(e.target.files);
    fileInput.value = '';
  });

  searchInput.addEventListener('input', (e) => {
    renderPlaylist(e.target.value);
  });

  playlistBody.addEventListener('click', (e) => {
    const track = e.target.closest('.track');
    const deleteBtn = e.target.closest('.delete-btn');
    
    if (deleteBtn) {
      e.stopPropagation();
      const id = parseInt(deleteBtn.dataset.id);
      handleDeleteTrack(id);
    } else if (track) {
      const id = parseInt(track.dataset.id);
      const index = tracks.findIndex(t => t.id === id);
      playTrack(index);
    }
  });

  playPauseBtn.addEventListener('click', togglePlayPause);
  prevBtn.addEventListener('click', playPrevious);
  nextBtn.addEventListener('click', playNext);

  audioPlayer.addEventListener('timeupdate', () => {
    const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
    progressFill.style.width = `${progress}%`;
    currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
  });

  audioPlayer.addEventListener('loadedmetadata', () => {
    totalTimeEl.textContent = formatTime(audioPlayer.duration);
  });

  audioPlayer.addEventListener('ended', playNext);

  audioPlayer.addEventListener('play', () => {
    isPlaying = true;
    updatePlayPauseIcon();
  });

  audioPlayer.addEventListener('pause', () => {
    isPlaying = false;
    updatePlayPauseIcon();
  });

  progressBar.addEventListener('click', (e) => {
    const rect = progressBar.getBoundingClientRect();
    const percent = (e.clientX - rect.left) / rect.width;
    audioPlayer.currentTime = percent * audioPlayer.duration;
  });

  volumeSlider.addEventListener('input', (e) => {
    audioPlayer.volume = e.target.value / 100;
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    
    switch(e.code) {
      case 'Space':
        e.preventDefault();
        togglePlayPause();
        break;
      case 'ArrowRight':
        e.preventDefault();
        playNext();
        break;
      case 'ArrowLeft':
        e.preventDefault();
        playPrevious();
        break;
    }
  });

  // Initialize
  audioPlayer.volume = 0.7;
  initDB().then(() => {
    loadTracks();
  }).catch(error => {
    console.error('Failed to initialize DB:', error);
    showToast('Failed to initialize database', 'error');
  });

})();
</script>
</body>
</html>
