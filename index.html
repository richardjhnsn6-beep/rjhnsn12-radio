<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Audio Player</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    * {
        font-family: 'Inter', sans-serif;
    }
    
    .glass {
        background: rgba(30, 30, 40, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .progress-bar {
        background: linear-gradient(90deg, #8b5cf6 0%, #06b6d4 100%);
        transition: width 0.1s linear;
    }
    
    .volume-slider, .progress-slider {
        -webkit-appearance: none;
        appearance: none;
        background: transparent;
        cursor: pointer;
    }
    
    .volume-slider::-webkit-slider-track, .progress-slider::-webkit-slider-track {
        background: rgba(255, 255, 255, 0.1);
        height: 4px;
        border-radius: 2px;
    }
    
    .volume-slider::-webkit-slider-thumb, .progress-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #fff;
        margin-top: -5px;
        box-shadow: 0 2px 8px rgba(139, 92, 246, 0.5);
        transition: all 0.2s ease;
    }
    
    .volume-slider::-webkit-slider-thumb:hover, .progress-slider::-webkit-slider-thumb:hover {
        transform: scale(1.2);
        box-shadow: 0 2px 12px rgba(139, 92, 246, 0.8);
    }
    
    .volume-slider::-moz-range-track, .progress-slider::-moz-range-track {
        background: rgba(255, 255, 255, 0.1);
        height: 4px;
        border-radius: 2px;
    }
    
    .volume-slider::-moz-range-thumb, .progress-slider::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #fff;
        border: none;
        box-shadow: 0 2px 8px rgba(139, 92, 246, 0.5);
    }
    
    .track-item {
        transition: all 0.2s ease;
    }
    
    .track-item:hover {
        background: rgba(139, 92, 246, 0.1);
        transform: translateX(4px);
    }
    
    .track-item.active {
        background: rgba(139, 92, 246, 0.2);
        border-left: 3px solid #8b5cf6;
    }
    
    .album-art {
        animation: rotate 20s linear infinite;
        animation-play-state: paused;
    }
    
    .album-art.playing {
        animation-play-state: running;
    }
    
    @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
    
    .visualizer-bar {
        background: linear-gradient(180deg, #8b5cf6 0%, #06b6d4 100%);
        animation: pulse 0.8s ease-in-out infinite;
    }
    
    @keyframes pulse {
        0%, 100% { transform: scaleY(0.3); }
        50% { transform: scaleY(1); }
    }
    
    .btn-glow:hover {
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
    }
</style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-purple-950 to-slate-950 min-h-screen text-white flex items-center justify-center p-4">
<!--
SETUP INSTRUCTIONS FOR YOUR SERVER:

1. Upload this HTML file to your web server's public folder (e.g., public_html, www, htdocs)

2. Create a folder named "music" in the same directory as this HTML file
   Example structure:
   /public_html/
     ├── index.html  (this file)
     └── /music/
          ├── song1.mp3
          ├── song2.mp3
          └── song3.mp3

3. Upload your MP3 files to the /music/ folder

4. Update the PLAYLIST array below (line ~250) to match your actual filenames
   Format: { title: "Display Name", artist: "Artist Name", src: "music/filename.mp3" }
   
5. NOTE: This player is client-side only. All visitors will stream the same MP3 files 
   from your /music/ folder. There is no shared sync - each visitor controls their own playback.

6. For large files, ensure your hosting supports byte-range requests for proper seeking.
-->

    <div class="w-full max-w-4xl mx-auto">
        <div class="glass rounded-3xl shadow-2xl overflow-hidden">
            <!-- Header -->
            <div class="px-6 sm:px-8 pt-8 pb-4 border-b border-white/10">
                <div class="flex items-center justify-between mb-2">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-violet-500 to-cyan-500 flex items-center justify-center">
                            <i class="fa-solid fa-music text-white text-lg"></i>
                        </div>
                        <div>
                            <h1 class="text-2xl font-bold bg-gradient-to-r from-violet-400 to-cyan-400 bg-clip-text text-transparent">Nova Player</h1>
                            <p class="text-xs text-slate-400">Public Music Stream</p>
                        </div>
                    <div class="flex gap-2">
                        <button id="loopBtn" class="w-9 h-9 rounded-lg bg-white/5 hover:bg-white/10 transition-all btn-glow" title="Loop">
                            <i class="fa-solid fa-repeat text-sm text-slate-400"></i>
                        </button>
                        <button id="shuffleBtn" class="w-9 h-9 rounded-lg bg-white/5 hover:bg-white/10 transition-all btn-glow" title="Shuffle">
                            <i class="fa-solid fa-shuffle text-sm text-slate-400"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Main Player -->
            <div class="p-6 sm:p-8">
                <div class="grid md:grid-cols-2 gap-8 mb-8">
                    <!-- Album Art & Visualizer -->
                    <div class="flex flex-col items-center justify-center">
                        <div class="relative w-56 h-56 sm:w-64 sm:h-64 mb-6">
                            <div class="album-art absolute inset-0 rounded-full bg-gradient-to-br from-violet-600 via-purple-600 to-cyan-600 p-1 shadow-2xl" id="albumArt">
                                <div class="w-full h-full rounded-full bg-slate-900 flex items-center justify-center">
                                    <i class="fa-solid fa-music text-6xl text-white/20"></i>
                                </div>
                            </div>
                            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                                <div class="w-12 h-12 rounded-full bg-slate-950 border-4 border-slate-800"></div>
                            </div>
                        </div>
                        
                        <!-- Visualizer -->
                        <div class="flex gap-1 h-12 items-end" id="visualizer">
                            <div class="visualizer-bar w-1 rounded-full" style="animation-delay: 0s; height: 20%"></div>
                            <div class="visualizer-bar w-1 rounded-full" style="animation-delay: 0.1s; height: 60%"></div>
                            <div class="visualizer-bar w-1 rounded-full" style="animation-delay: 0.2s; height: 40%"></div>
                            <div class="visualizer-bar w-1 rounded-full" style="animation-delay: 0.3s; height: 80%"></div>
                            <div class="visualizer-bar w-1 rounded-full" style="animation-delay: 0.4s; height: 50%"></div>
                            <div class="visualizer-bar w-1 rounded-full" style="animation-delay: 0.5s; height: 90%"></div>
                            <div class="visualizer-bar w-1 rounded-full" style="animation-delay: 0.6s; height: 30%"></div>
                            <div class="visualizer-bar w-1 rounded-full" style="animation-delay: 0.7s; height: 70%"></div>
                        </div>
                    </div>

                    <!-- Track Info & Controls -->
                    <div class="flex flex-col justify-center">
                        <div class="mb-6 text-center md:text-left">
                            <h2 id="trackTitle" class="text-2xl sm:text-3xl font-bold mb-2 truncate">Select a Track</h2>
                            <p id="trackArtist" class="text-slate-400 text-lg">No track loaded</p>
                        </div>

                        <!-- Progress Bar -->
                        <div class="mb-6">
                            <input type="range" id="progressSlider" class="progress-slider w-full h-1 mb-2" value="0" min="0" max="100">
                            <div class="flex justify-between text-xs text-slate-400">
                                <span id="currentTime">0:00</span>
                                <span id="duration">0:00</span>
                            </div>
                        </div>

                        <!-- Main Controls -->
                        <div class="flex items-center justify-center gap-4 mb-6">
                            <button id="prevBtn" class="w-12 h-12 rounded-full bg-white/5 hover:bg-white/10 transition-all flex items-center justify-center btn-glow">
                                <i class="fa-solid fa-backward-step text-xl"></i>
                            </button>
                            <button id="playBtn" class="w-16 h-16 rounded-full bg-gradient-to-br from-violet-500 to-cyan-500 hover:from-violet-600 hover:to-cyan-600 transition-all flex items-center justify-center shadow-lg shadow-violet-500/50 btn-glow">
                                <i class="fa-solid fa-play text-2xl ml-1" id="playIcon"></i>
                            </button>
                            <button id="nextBtn" class="w-12 h-12 rounded-full bg-white/5 hover:bg-white/10 transition-all flex items-center justify-center btn-glow">
                                <i class="fa-solid fa-forward-step text-xl"></i>
                            </button>
                        </div>

                        <!-- Volume Control -->
                        <div class="flex items-center gap-3">
                            <button id="muteBtn" class="text-slate-400 hover:text-white transition-colors">
                                <i class="fa-solid fa-volume-high text-lg" id="volumeIcon"></i>
                            </button>
                            <input type="range" id="volumeSlider" class="volume-slider flex-1 h-1" value="70" min="0" max="100">
                            <span id="volumeValue" class="text-xs text-slate-400 w-8 text-right">70%</span>
                        </div>

                        <!-- Auto Play Toggle -->
                        <div class="flex items-center justify-center mt-6 gap-2">
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="autoplayToggle" class="sr-only peer">
                                <div class="w-11 h-6 bg-white/10 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-gradient-to-r peer-checked:from-violet-500 peer-checked:to-cyan-500"></div>
                                <span class="ml-3 text-sm text-slate-400">Auto-play</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Playlist -->
                <div class="border-t border-white/10 pt-6">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-semibold flex items-center gap-2">
                            <i class="fa-solid fa-list-ul text-violet-400"></i>
                            Playlist
                        </h3>
                        <span id="playlistCount" class="text-sm text-slate-400">0 tracks</span>
                    </div>
                    <div id="playlist" class="space-y-2 max-h-80 overflow-y-auto pr-2">
                        <!-- Playlist items will be inserted here by JS -->
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-6 text-xs text-slate-500">
            <p>Upload MP3 files to /music/ folder and update the playlist in the code</p>
        </div>
    </div>

    <audio id="audioPlayer" preload="metadata"></audio>

    <script>
        // ============================================
        // PLAYLIST CONFIGURATION
        // ============================================
        // Upload your mp3 files to a /music/ folder on your hosting,
        // then edit this playlist array to match your filenames.
        
        const PLAYLIST = [
            { 
                title: "Sunset Dreams", 
                artist: "Ambient Collective", 
                src: "music/song1.mp3" 
            },
            { 
                title: "Midnight Drive", 
                artist: "Synth Waves", 
                src: "music/song2.mp3" 
            },
            { 
                title: "Ocean Breeze", 
                artist: "Nature Sounds", 
                src: "music/song3.mp3" 
            }
        ];
        
        // ============================================
        // PLAYER LOGIC - Don't edit below unless needed
        // ============================================
        
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressSlider = document.getElementById('progressSlider');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeValue = document.getElementById('volumeValue');
        const muteBtn = document.getElementById('muteBtn');
        const volumeIcon = document.getElementById('volumeIcon');
        const loopBtn = document.getElementById('loopBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const autoplayToggle = document.getElementById('autoplayToggle');
        const trackTitle = document.getElementById('trackTitle');
        const trackArtist = document.getElementById('trackArtist');
        const playlistEl = document.getElementById('playlist');
        const playlistCount = document.getElementById('playlistCount');
        const albumArt = document.getElementById('albumArt');
        const visualizer = document.getElementById('visualizer');
        
        let currentTrackIndex = 0;
        let isPlaying = false;
        let isLooping = false;
        let isShuffle = false;
        let isDragging = false;
        let lastVolume = 0.7;
        
        // Initialize
        function init() {
            renderPlaylist();
            loadTrack(0);
            audio.volume = 0.7;
            updateVisualizer(false);
        }
        
        // Render playlist
        function renderPlaylist() {
            playlistEl.innerHTML = '';
            playlistCount.textContent = `${PLAYLIST.length} track${PLAYLIST.length !== 1 ? 's' : ''}`;
            
            PLAYLIST.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = `track-item flex items-center gap-4 p-3 rounded-xl cursor-pointer ${index === currentTrackIndex ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-violet-500/20 to-cyan-500/20 flex items-center justify-center flex-shrink-0">
                        <span class="text-sm font-semibold text-violet-400">${index + 1}</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="font-medium truncate">${track.title}</div>
                        <div class="text-sm text-slate-400 truncate">${track.artist}</div>
                    </div>
                    <div class="text-xs text-slate-500" id="track-duration-${index}">--:--</div>
                `;
                item.addEventListener('click', () => {
                    loadTrack(index);
                    play();
                });
                playlistEl.appendChild(item);
                
                // Load duration for each track
                const tempAudio = new Audio(track.src);
                tempAudio.addEventListener('loadedmetadata', () => {
                    document.getElementById(`track-duration-${index}`).textContent = formatTime(tempAudio.duration);
                });
            });
        }
        
        // Load track
        function loadTrack(index) {
            currentTrackIndex = index;
            const track = PLAYLIST[index];
            audio.src = track.src;
            trackTitle.textContent = track.title;
            trackArtist.textContent = track.artist;
            
            // Update active state
            document.querySelectorAll('.track-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
        }
        
        // Play/Pause
        function togglePlay() {
            if (isPlaying) {
                pause();
            } else {
                play();
            }
        }
        
        function play() {
            audio.play().then(() => {
                isPlaying = true;
                playIcon.classList.replace('fa-play', 'fa-pause');
                playIcon.classList.remove('ml-1');
                albumArt.classList.add('playing');
                updateVisualizer(true);
            }).catch(err => {
                console.log('Playback prevented:', err);
            });
        }
        
        function pause() {
            audio.pause();
            isPlaying = false;
            playIcon.classList.replace('fa-pause', 'fa-play');
            playIcon.classList.add('ml-1');
            albumArt.classList.remove('playing');
            updateVisualizer(false);
        }
        
        // Next/Previous
        function nextTrack() {
            if (isShuffle) {
                currentTrackIndex = Math.floor(Math.random() * PLAYLIST.length);
            } else {
                currentTrackIndex = (currentTrackIndex + 1) % PLAYLIST.length;
            }
            loadTrack(currentTrackIndex);
            if (isPlaying || autoplayToggle.checked) {
                play();
            }
        }
        
        function prevTrack() {
            if (audio.currentTime > 3) {
                audio.currentTime = 0;
            } else {
                currentTrackIndex = (currentTrackIndex - 1 + PLAYLIST.length) % PLAYLIST.length;
                loadTrack(currentTrackIndex);
                if (isPlaying) {
                    play();
                }
            }
        }
        
        // Format time
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        // Update progress
        function updateProgress() {
            if (!isDragging && audio.duration) {
                const progress = (audio.currentTime / audio.duration) * 100;
                progressSlider.value = progress;
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }
        }
        
        // Update visualizer
        function updateVisualizer(active) {
            const bars = visualizer.querySelectorAll('.visualizer-bar');
            bars.forEach(bar => {
                bar.style.animationPlayState = active ? 'running' : 'paused';
            });
        }
        
        // Event Listeners
        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', nextTrack);
        prevBtn.addEventListener('click', prevTrack);
        
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
        });
        
        audio.addEventListener('ended', () => {
            if (isLooping) {
                audio.currentTime = 0;
                play();
            } else if (autoplayToggle.checked) {
                nextTrack();
            } else {
                pause();
                audio.currentTime = 0;
            }
        });
        
        progressSlider.addEventListener('input', (e) => {
            isDragging = true;
            const time = (e.target.value / 100) * audio.duration;
            currentTimeEl.textContent = formatTime(time);
        });
        
        progressSlider.addEventListener('change', (e) => {
            const time = (e.target.value / 100) * audio.duration;
            audio.currentTime = time;
            isDragging = false;
        });
        
        volumeSlider.addEventListener('input', (e) => {
            const volume = e.target.value / 100;
            audio.volume = volume;
            volumeValue.textContent = `${e.target.value}%`;
            lastVolume = volume;
            
            if (volume === 0) {
                volumeIcon.className = 'fa-solid fa-volume-xmark text-lg';
            } else if (volume < 0.5) {
                volumeIcon.className = 'fa-solid fa-volume-low text-lg';
            } else {
                volumeIcon.className = 'fa-solid fa-volume-high text-lg';
            }
        });
        
        muteBtn.addEventListener('click', () => {
            if (audio.volume > 0) {
                lastVolume = audio.volume;
                audio.volume = 0;
                volumeSlider.value = 0;
                volumeValue.textContent = '0%';
                volumeIcon.className = 'fa-solid fa-volume-xmark text-lg';
            } else {
                audio.volume = lastVolume;
                volumeSlider.value = lastVolume * 100;
                volumeValue.textContent = `${Math.round(lastVolume * 100)}%`;
                volumeIcon.className = 'fa-solid fa-volume-high text-lg';
            }
        });
        
        loopBtn.addEventListener('click', () => {
            isLooping = !isLooping;
            loopBtn.classList.toggle('bg-violet-500/30');
            loopBtn.querySelector('i').classList.toggle('text-violet-400');
            loopBtn.querySelector('i').classList.toggle('text-slate-400');
        });
        
        shuffleBtn.addEventListener('click', () => {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('bg-violet-500/30');
            shuffleBtn.querySelector('i').classList.toggle('text-violet-400');
            shuffleBtn.querySelector('i').classList.toggle('text-slate-400');
        });
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            switch(e.code) {
                case 'Space':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowRight':
                    nextTrack();
                    break;
                case 'ArrowLeft':
                    prevTrack();
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    audio.volume = Math.min(1, audio.volume + 0.1);
                    volumeSlider.value = audio.volume * 100;
                    volumeValue.textContent = `${Math.round(audio.volume * 100)}%`;
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    audio.volume = Math.max(0, audio.volume - 0.1);
                    volumeSlider.value = audio.volume * 100;
                    volumeValue.textContent = `${Math.round(audio.volume * 100)}%`;
                    break;
            }
        });
        
        // Initialize player
        init();
    </script>
</body>
</html>
