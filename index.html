<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiet Storm Radio - rjhnsn12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap');
        
        :root {
            --pink: #ff1493;
            --pink-dark: #c41072;
            --bg-primary: #0a0a0f;
            --bg-secondary: #13131a;
            --bg-card: #1a1a24;
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1b5;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
        }
        
        .font-display {
            font-family: 'Playfair Display', serif;
        }
        
        .glass {
            background: rgba(26, 26, 36, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 20, 147, 0.1);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #ff1493 0%, #ff6ec7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #ff1493 0%, #ff6ec7 100%);
        }
        
        .glow-pink {
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.4), 0 0 40px rgba(255, 20, 147, 0.1);
        }
        
        .hover-glow:hover {
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.6);
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }
        
        .vinyl-spin {
            animation: spin 3s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .visualizer-bar {
            background: linear-gradient(to top, #ff1493, #ff6ec7);
            animation: dance 0.5s ease-in-out infinite alternate;
        }
        
        @keyframes dance {
            0% { height: 20%; }
            100% { height: 100%; }
        }
        
        .visualizer-bar:nth-child(1) { animation-delay: 0.1s; }
        .visualizer-bar:nth-child(2) { animation-delay: 0.2s; }
        .visualizer-bar:nth-child(3) { animation-delay: 0.3s; }
        .visualizer-bar:nth-child(4) { animation-delay: 0.4s; }
        .visualizer-bar:nth-child(5) { animation-delay: 0.5s; }
        
        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: var(--pink);
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 20, 147, 0.8);
        }
        
        .progress-bar::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--pink);
            cursor: pointer;
            border-radius: 50%;
            border: none;
            box-shadow: 0 0 10px rgba(255, 20, 147, 0.8);
        }
        
        .page {
            display: none;
        }
        
        .page.active {
            display: block;
            animation: fadeIn 0.4s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .nav-link.active {
            color: var(--pink);
            position: relative;
        }
        
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--pink);
            border-radius: 2px;
        }
        
        .track-item:hover {
            background: rgba(255, 20, 147, 0.1);
        }
        
        .track-item.active {
            background: rgba(255, 20, 147, 0.2);
            border-left: 3px solid var(--pink);
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 20, 147, 0.4);
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--pink);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--pink-dark);
        }
    </style>
</head>
<body>
    <!-- Background Gradient Effects -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-pink-500 rounded-full mix-blend-multiply filter blur-[120px] opacity-10"></div>
        <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-purple-500 rounded-full mix-blend-multiply filter blur-[120px] opacity-10"></div>
    </div>

    <!-- Header -->
    <header class="sticky top-0 z-50 glass">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex items-center space-x-3">
                    <div class="w-12 h-12 gradient-bg rounded-full flex items-center justify-center glow-pink">
                        <i class="fas fa-broadcast-tower text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-display text-2xl font-bold gradient-text">Quiet Storm</h1>
                        <p class="text-xs text-gray-400">rjhnsn12</p>
                    </div>
                </div>
                
                <nav class="hidden md:flex items-center space-x-8">
                    <button class="nav-link active text-sm font-medium transition-colors hover:text-pink-400" data-page="radio">
                        Radio
                    </button>
                    <button class="nav-link text-sm font-medium text-gray-300 transition-colors hover:text-pink-400" data-page="podcast">
                        Podcast
                    </button>
                    <button class="nav-link text-sm font-medium text-gray-300 transition-colors hover:text-pink-400" data-page="shop">
                        Shop
                    </button>
                    <button class="nav-link text-sm font-medium text-gray-300 transition-colors hover:text-pink-400" data-page="amos">
                        Amos Sample
                    </button>
                </nav>
                
                <button id="mobileMenuBtn" class="md:hidden text-2xl text-gray-300 hover:text-pink-400">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
        
        <!-- Mobile Menu -->
        <div id="mobileMenu" class="hidden md:hidden border-t border-gray-800">
            <div class="px-4 py-3 space-y-2">
                <button class="nav-link active block w-full text-left py-2 text-sm font-medium" data-page="radio">Radio</button>
                <button class="nav-link block w-full text-left py-2 text-sm font-medium text-gray-300" data-page="podcast">Podcast</button>
                <button class="nav-link block w-full text-left py-2 text-sm font-medium text-gray-300" data-page="shop">Shop</button>
                <button class="nav-link block w-full text-left py-2 text-sm font-medium text-gray-300" data-page="amos">Amos Sample</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 relative z-10 pb-40">
        
        <!-- Radio Page -->
        <div id="radio" class="page active">
            <div class="grid lg:grid-cols-3 gap-8">
                <!-- Player Card -->
                <div class="lg:col-span-2">
                    <div class="glass rounded-3xl p-8 glow-pink">
                        <div class="flex flex-col items-center">
                            <!-- Album Art & Visualizer -->
                            <div class="relative mb-8">
                                <div id="vinyl" class="w-64 h-64 md:w-80 md:h-80 rounded-full gradient-bg p-2 shadow-2xl">
                                    <div class="w-full h-full bg-gray-900 rounded-full flex items-center justify-center overflow-hidden">
                                        <div class="w-16 h-16 bg-gray-800 rounded-full flex items-center justify-center border-4 border-gray-700">
                                            <div class="w-3 h-3 bg-pink-500 rounded-full"></div>
                                        </div>
                                    </div>
                                </div>
                                <div id="visualizer" class="hidden absolute inset-0 items-end justify-center gap-1 pb-4">
                                    <div class="visualizer-bar w-2 rounded-t-full"></div>
                                    <div class="visualizer-bar w-2 rounded-t-full"></div>
                                    <div class="visualizer-bar w-2 rounded-t-full"></div>
                                    <div class="visualizer-bar w-2 rounded-t-full"></div>
                                    <div class="visualizer-bar w-2 rounded-t-full"></div>
                                </div>
                            </div>

                            <!-- Track Info -->
                            <div class="text-center mb-6 w-full">
                                <h2 id="trackTitle" class="text-2xl font-bold mb-2">Select a track to begin</h2>
                                <p id="trackArtist" class="text-gray-400">24/7 Smooth R&B, Soul & Jazz</p>
                                <div class="flex items-center justify-center gap-2 mt-4">
                                    <div class="w-2 h-2 bg-pink-500 rounded-full animate-pulse"></div>
                                    <span id="liveStatus" class="text-sm text-pink-400 font-medium">OFFLINE</span>
                                </div>
                            </div>

                            <!-- Progress Bar -->
                            <div class="w-full mb-6">
                                <input type="range" id="progressBar" class="progress-bar w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer" value="0" min="0" max="100">
                                <div class="flex justify-between text-xs text-gray-500 mt-2">
                                    <span id="currentTime">0:00</span>
                                    <span id="duration">0:00</span>
                                </div>
                            </div>

                            <!-- Controls -->
                            <div class="flex items-center justify-center gap-6 mb-6">
                                <button id="shuffleBtn" class="text-2xl text-gray-400 hover:text-pink-400 transition-colors">
                                    <i class="fas fa-random"></i>
                                </button>
                                <button id="prevBtn" class="text-3xl text-gray-300 hover:text-pink-400 transition-colors">
                                    <i class="fas fa-step-backward"></i>
                                </button>
                                <button id="playBtn" class="w-16 h-16 gradient-bg rounded-full flex items-center justify-center text-white text-2xl hover-glow transition-all">
