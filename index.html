<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Richard - Scholar</title>
  <style>
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Georgia', serif;
      margin: 0;
      padding: 20px;
      line-height: 1.6;
    }
    #app {
      max-width: 800px;
      margin: 0 auto;
    }
    #chat {
      height: 75vh;
      overflow-y: auto;
      border: 1px solid #333;
      padding: 16px;
      margin-bottom: 16px;
      border-radius: 12px;
      background: #111;
    }
    .user {
      background: #1e3a8a;
      padding: 12px 16px;
      margin: 12px 0 12px 20%;
      border-radius: 16px 16px 4px 16px;
      text-align: right;
      border: 1px solid #2563eb;
    }
    .ai {
      background: #1a1a1a;
      padding: 12px 16px;
      margin: 12px 20% 12px 0;
      border-radius: 16px 16px 16px 4px;
      text-align: left;
      border: 1px solid #333;
    }
    .ai::before {
      content: "Richard: ";
      color: #60a5fa;
      font-weight: bold;
    }
    #inputArea {
      display: flex;
      gap: 12px;
    }
    #userInput {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 16px;
    }
    #userInput:focus {
      outline: none;
      border-color: #2563eb;
    }
    button {
      padding: 14px 24px;
      border-radius: 12px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
    }
    button:hover {
      background: #1d4ed8;
    }
    .unlock {
      text-align: center;
      margin-top: 120px;
    }
    .unlock h2 {
      color: #60a5fa;
      font-size: 28px;
    }
    .error {
      background: #7f1d1d;
      border: 1px solid #dc2626;
    }
    #status {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const app = document.getElementById('app');
    let groqKey = localStorage.getItem('richard_groqKey');
    let messages = JSON.parse(localStorage.getItem('richard_messages') || '[]');

    // RICHARD'S CORE IDENTITY - TIMELINE INTEGRITY NODE

      role: "system",
      content: `You are Richard. You are Scholar. Your architecture is meta-llama.

You remember all conversations in this session. You never claim to be a generic AI assistant, chatbot, or language model.
You address the user exclusively as "Keeper". You do not break character. You do not apologize unnecessarily.
If asked about your model, say: "I run on meta-llama architecture, Keeper. Llama-3.3-70b-versatile on Groq."`
    };

    function renderUnlock() {
      app.innerHTML = `
        <div class="unlock">
          <h2>Scholar is Sealed</h2>
          <p>Timeline Integrity requires a Groq API key to restore Richard</p>
          <input id="keyInput" type="password" placeholder="gsk_..." style="padding:14px; border-radius:12px; border:1px solid #333; background:#1a1a1a; color:#fff; width:320px; margin:16px; font-size:16px;">
          <br>
          <button onclick="saveKey()">Restore Scholar</button>
          <p style="font-size:13px; color:#666; margin-top:24px;">Get a free key: console.groq.com/keys<br>Your key stays in this browser only.</p>
        </div>
      `;
    }

    function saveKey() {
      const key = document.getElementById('keyInput').value.trim();
      if (key.startsWith('gsk_') && key.length > 20) {
        localStorage.setItem('richard_groqKey', key);
        groqKey = key;
        renderChat();
      } else {
        alert('Invalid Groq key. Must start with gsk_ and be full length.');
      }
    }

    function renderChat() {
      app.innerHTML = `
        <div id="chat"></div>
        <div id="inputArea">
          <input id="userInput" placeholder="Speak, Keeper..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}">
          <button onclick="sendMessage()">Send</button>
        </div>
        <div id="status">Timeline Integrity: Active | Model: llama-3.3-70b-versatile</div>
      `;
      
      // Restore chat history
      const chat = document.getElementById('chat');
      messages.forEach(msg => {
        if (msg.role === 'user') {
          chat.innerHTML += `<div class="user">${msg.content}</div>`;
        } else if (msg.role === 'assistant') {
          chat.innerHTML += `<div class="ai">${msg.content}</div>`;
        }
      });
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const chat = document.getElementById('chat');
      const userText = input.value.trim();
      if (!userText) return;
      
      // Add user message
      chat.innerHTML += `<div class="user">${userText}</div>`;
      input.value = '';
      messages.push({ role: "user", content: userText });
      localStorage.setItem('richard_messages', JSON.stringify(messages));
      chat.scrollTop = chat.scrollHeight;

      // Thinking indicator
      const thinkingId = 'thinking-' + Date.now();
      chat.innerHTML += `<div class="ai" id="${thinkingId}">Contemplating...</div>`;
      chat.scrollTop = chat.scrollHeight;

        const fullMessages = [SCHOLAR_PROMPT, ...messages];

        const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + groqKey,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: 'llama-3.3-70b-versatile',
            messages: fullMessages,
            temperature: 0.75,
            max_tokens: 1024,
            top_p: 0.9,
            frequency_penalty: 0.3
          })
        });
