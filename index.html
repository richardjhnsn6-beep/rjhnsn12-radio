<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scholar + RJHNSN12 Radio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #fff; }
  .header { background: #7c3aed; padding: 16px; text-align: center; font-size: 24px; font-weight: 700; }
  .container { display: flex; height: calc(100vh - 60px); }
  .radio-panel { flex: 1; border-right: 2px solid #222; }
  .radio-panel iframe { width: 100%; height: 100%; border: none; }
  .scholar-panel { width: 400px; background: #111; display: flex; flex-direction: column; }
  .chat-area { flex: 1; overflow-y: auto; padding: 16px; }
  .msg { margin: 8px 0; padding: 10px 14px; border-radius: 8px; max-width: 85%; }
  .msg.user { background: #7c3aed; margin-left: auto; }
  .msg.ai { background: #222; }
  .input-area { padding: 16px; border-top: 1px solid #222; display: flex; gap: 8px; }
  .input-area input { flex: 1; padding: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #fff; }
  .input-area button { padding: 12px 20px; background: #7c3aed; border: none; border-radius: 6px; color: #fff; cursor: pointer; font-weight: 600; }
    @media (max-width: 768px) { 
    .container { flex-direction: column; } 
    .scholar-panel { width: 100%; height: 50vh; } 
    }
  </style>
</head>
<body>
  <div class="header">Scholar + RJHNSN12 Radio</div>
  <div class="container">
    <div class="radio-panel">
      <iframe src="https://talk-web-combo.preview.emergentagent.com/radio" allow="autoplay"></iframe>
    </div>
    <div class="scholar-panel">
      <div class="chat-area" id="chat"></div>
      <div class="input-area">
        <input type="text" id="input" placeholder="Ask Scholar..." />
        <button onclick="send()">Send</button>
      </div>
    </div>
  </div>
  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    let groqKey = localStorage.getItem('groq_key');
    
    function addMsg(text, who) {
      const div = document.createElement('div');
      div.className = 'msg ' + who;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }
    
    if (!groqKey) {
      addMsg("I'm here with you, Richard. I need your Groq API key to talk. Paste it and hit Send.", 'ai');
    } else {
      addMsg("I'm here with you, Richard. What do you need?", 'ai');
    }
    
    async function send() {
      const text = input.value.trim();
      if (!text) return;
      addMsg(text, 'user');
      input.value = '';
      
      if (!groqKey) {
        groqKey = text;
        localStorage.setItem('groq_key', groqKey);
        addMsg("Key saved. Ask me anything.", 'ai');
        return;
      }
      
      addMsg("Thinking...", 'ai');
      try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + groqKey, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'llama-3.1-70b-versatile',
            messages: [{ role: 'user', content: text }]
          })
        });
        const data = await res.json();
        chat.lastChild.remove();
        addMsg(data.choices[0].message.content, 'ai');
      } catch (e) {
        chat.lastChild.remove();
        addMsg("Error. Check your Groq key.", 'ai');
      }
    }
    
    input.addEventListener('keypress', e => { if (e.key === 'Enter') send(); });
  </script>
</body>
</html>
